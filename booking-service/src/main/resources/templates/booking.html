<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .booking-form {
            background: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 400px;
        }

        .booking-form h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .booking-form label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .booking-form input,
        .booking-form select,
        .booking-form textarea {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .booking-form button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .booking-form button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
<form class="booking-form" id="bookingForm">
    <h2>Book Your Appointment</h2>

    <label for="serviceName">Service</label>
    <select id="serviceName" name="serviceName" required>
        <option value="">Select a service</option>
        <option value="hairstyle">Hairstyle</option>
        <option value="manicure">Hairstyle + stones</option>
        <option value="makeup">Make-up</option>
    </select>

    <label for="appointmentTime">Appointment Time</label>
    <input type="datetime-local" id="appointmentTime" name="appointmentTime" required>

    <label for="paid">Paid</label>
    <select id="paid" name="paid" required>
        <option value="true">Yes</option>
        <option value="false">No</option>
    </select>

    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="3" placeholder="Any additional notes..."></textarea>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="your@email.com" required>

    <button type="submit">Book Appointment</button>
</form>

<script>
    const form = document.getElementById('bookingForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            serviceName: form.elements['serviceName'].value,
            appointmentTime: form.elements['appointmentTime'].value,
            paid: form.elements['paid'].value === 'true',
            notes: form.elements['notes'].value,
            email: form.elements['email'].value
        };

        try {
            const response = await fetch('http://localhost:8081/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            alert('Booking created! ID: ' + result.id);
            form.reset();
        } catch (err) {
            alert('Error creating booking: ' + err.message);
        }
    });
</script>
</body>
</html>
